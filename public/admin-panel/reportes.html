<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reportes - Flores Juniors</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      background: url('/admin-panel/cancha.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      background-color: #002f6c;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      padding: 1rem;
      padding-top: 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
      z-index: 1040;
      transition: transform 0.3s ease;
    }
    .sidebar a {
      color: white;
      text-decoration: none;
    }
    .btn-outline-light {
      border-color: #FFD500 !important;
    }
    .btn-outline-light:hover {
      background-color: #FFD500 !important;
      color: black !important;
    }

    /* TOGGLE MOBILE */
    .toggle-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1050;
      display: none;
    }

    @media (max-width: 767px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.show {
        transform: translateX(0);
      }
      .toggle-btn {
        display: block;
      }
      .main-content {
        margin-left: 0 !important;
      }
    }

    /* MAIN CONTENT */
    .main-content {
      margin-left: 200px;
      padding: 2rem;
    }

    /* CARD (TSMC STYLE) */
    .dashboard-card {
      background: white;
      color: #004aad;
      margin-bottom: 2rem;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.15);
    }

    .card-title-tsmc {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 5px;
      color: #1c4e80;
      text-align: left;
    }
    .card-subtitle-tsmc {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 10px;
      text-align: left;
    }

    /* DONUT */
    .donut-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 35px;
      padding: 10px 0 20px 0;
    }

    .donut-container {
      position: relative;
      width: 240px;
      height: 240px;
    }

    .donut-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      font-weight: bold;
      color: #333;
    }

    /* Leyenda */
    .donut-legend {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
  </style>
</head>

<body>

<!-- BOTÓN HAMBURGUESA -->
<button class="toggle-btn" onclick="toggleSidebar()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="/admin-panel/index.html" class="btn btn-outline-light">👥 Socios</a>
  <a href="/admin-panel/pendientes.html" class="btn btn-outline-light">📥 Pendientes</a>
  <a href="/admin-panel/pagos.html" class="btn btn-outline-light">💳 Pagos</a>
  <a href="/admin-panel/gastos.html" class="btn btn-outline-light">🧾 Gastos</a>
  <a href="/admin-panel/noticias.html" class="btn btn-outline-light">📰 Noticias</a>
  <a href="/admin-panel/notificaciones.html" class="btn btn-outline-light">🔔 Notificaciones</a>
  <a href="/admin-panel/cumpleanios.html" class="btn btn-outline-light">🎂 Cumpleaños</a>
  <a href="/admin-panel/configuracion.html" class="btn btn-outline-light">⚙️ Configuración</a>
  <a href="/admin-panel/reportes.html" class="btn btn-outline-light">📊 Reportes</a>
  <button class="btn btn-outline-light" onclick="logout()">Cerrar sesión</button>
</div>

<!-- CONTENIDO -->
<div class="main-content">
  <div class="text-center mb-4">
    <img src="flores_jrs_logo.png" alt="Escudo" height="50">
    <h2 class="text-warning">Reportes - Flores Juniors</h2>
  </div>

  <!-- ============================================================== -->
  <!-- ███ 1) SOCIOS POR CATEGORÍA (DONUT TSMC)                    ███ -->
  <!-- ============================================================== -->
  <div class="dashboard-card">
    <div class="card-title-tsmc">Socios por Categoría</div>
    <div class="card-subtitle-tsmc">
      Distribución de socios activos por categoría.
    </div>

    <div class="donut-wrapper">

      <!-- Gráfico -->
      <div class="donut-container">
        <canvas id="chartCategorias"></canvas>
        <div id="totalCategorias" class="donut-center">0</div>
      </div>

      <!-- Leyenda -->
      <div id="legendCategorias" class="donut-legend"></div>

    </div>
  </div>

</div> <!-- main-content -->

<script>
/* ================================
   AUTH / LOGOUT
================================ */
if (!localStorage.getItem('token')) {
  window.location.href = "/admin-panel/login.html";
}

function logout() {
  localStorage.removeItem('token');
  window.location.href = "/admin-panel/login.html";
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('show');
}

/* Fetch con token */
function fetchConToken(url, opciones = {}) {
  const token = localStorage.getItem("token");
  return fetch(url, {
    ...opciones,
    headers: {
      "Authorization": "Bearer " + token,
      ...(opciones.headers || {})
    }
  }).then(res => {
    if (res.status === 401) {
      alert("⚠️ Sesión expirada");
      localStorage.removeItem("token");
      window.location.href = "/admin-panel/login.html";
      throw new Error("Sesión expirada");
    }
    return res;
  });
}

/* ================================
   1) Socios por Categoría
================================ */

async function cargarSociosPorCategoria() {
  try {
    const res = await fetchConToken("/reportes/socios-por-categoria");
    const data = await res.json();

    const total = data.reduce((acc, x) => acc + Number(x.cantidad), 0);
    document.getElementById("totalCategorias").textContent = total;

    const labels = data.map(x => x.categoria || "Sin categoría");
    const valores = data.map(x => Number(x.cantidad));

    const colores = ["#1c8c5a", "#1c4e80", "#d7263d", "#ff9f1c", "#9b5de5", "#00bbf9"];

    // LEYENDA
    const legend = document.getElementById("legendCategorias");
    legend.innerHTML = "";
    data.forEach((x, i) => {
      const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `
        <div class="legend-color" style="background:${colores[i % colores.length]}"></div>
        <span>${x.categoria} (${x.cantidad})</span>
      `;
      legend.appendChild(item);
    });

    // DONUT
    const ctx = document.getElementById("chartCategorias").getContext("2d");
    new Chart(ctx, {
      type: "doughnut",
      data: {
        labels,
        datasets: [{
          data: valores,
          backgroundColor: colores
        }]
      },
      options: {
        plugins: {
          legend: { display: false }
        },
        cutout: "60%"
      }
    });

  } catch (err) {
    console.error("❌ Error cargando Socios por Categoría:", err);
  }
}

/* AUTOLOAD */
document.addEventListener("DOMContentLoaded", async () => {
  await cargarSociosPorCategoria();
});
</script>

</body>
</html>
