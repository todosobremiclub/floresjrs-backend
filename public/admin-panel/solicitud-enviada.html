<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitud enviada</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:system-ui, Segoe UI, Arial;
      background:#f3f4f6;
    }
    .card{
      background:#fff;
      padding:24px;
      border-radius:16px;
      max-width:420px;
      text-align:center;
      border:1px solid #e5e7eb;
    }
    h2{ margin-top:0; color:#15803d; }
    p{ color:#475569; }
    .muted{ font-size:13px; color:#64748b; margin-top:10px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>✅ Solicitud enviada</h2>
    <p>
      Tu solicitud fue enviada correctamente y quedó
      <b>pendiente de revisión</b>.
    </p>
    <div class="muted">
      El club se va a contactar con vos.
    </div>
  </div>
</body>
</html>
