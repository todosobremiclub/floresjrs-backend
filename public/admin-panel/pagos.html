<button class="btn btn-warning ms-2" id="btnNuevoIngreso">

<details>

  <!-- Modal -->
  <div class="modal fade" id="modalNuevoPago" tabindex="-1">
    <div class="modal-dialog">
      <form class="modal-content" id="formPago">

<div class="modal fade" id="modalOtroIngreso" tabindex="-1">

      <div class="modal-header bg-warning">
        <h5 class="modal-title">Registrar Otro Ingreso</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

      <div class="modal-body text-black">

        <div class="mb-3">
          <label class="form-label">Tipo de ingreso</label>

  <style>
    .mes-cuadro {
      padding: 10px;
      background-color: #e0e0e0;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
      text-align: center;
      font-weight: bold;
      color: #004aad;
    }
    .mes-cuadro.seleccionado {
      background-color: #004aad;
      color: green;
    }

/* === Modal Otro Ingreso (amarillo institucional) === */
#modalOtroIngreso .modal-header {
  background-color: #FFD500;
  color: #000;
}

#modalOtroIngreso .modal-content {
  border: 2px solid #FFD500;
}

#modalOtroIngreso .btn-warning {
  background-color: #FFD500;
  border-color: #FFD500;
  color: #000;
  font-weight: 700;
}

#modalOtroIngreso .btn-warning:hover {
  background-color: #e6c200;
  border-color: #e6c200;
}
  </style>

  <script>
  let anioActual = new Date().getFullYear();
  let mesesSeleccionados = new Set();

  const nombresMeses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

  function renderizarMeses() {
  const contenedor = document.querySelector('#selector-anio-meses .row');
  contenedor.innerHTML = '';

  nombresMeses.forEach((mes, i) => {
    const idMes = `${anioActual}-${(i + 1).toString().padStart(2, '0')}`;
    const estaSeleccionado = mesesSeleccionados.has(idMes);

    const div = document.createElement('div');
    div.className = 'col';
    div.innerHTML = `
      <div class="mes-cuadro ${estaSeleccionado ? 'pagado' : ''}" onclick="toggleMes('${idMes}')">
        ${mes} ${estaSeleccionado ? '✅' : ''}
      </div>
    `;
    contenedor.appendChild(div);
  });

  
    document.getElementById('anioSeleccionado').textContent = anioActual;
  }

  function cambiarAnio(direccion) {
    anioActual += direccion;
    renderizarMeses();
  }

function toggleMes(idMes) {
  if (mesesSeleccionados.has(idMes)) {
    mesesSeleccionados.delete(idMes);
  } else {
    mesesSeleccionados.add(idMes);
  }
  renderizarMeses();
}


  function obtenerMesesPagados() {
    return Array.from(mesesSeleccionados);
  }

  function toggleDetalle(numeroSocio) {
    const div = document.getElementById(`detalle-${numeroSocio}`);
    div.style.display = div.style.display === 'none' ? 'block' : 'none';
  }

  async function eliminarMesPagado(id, numeroSocio) {
    if (!confirm('¿Eliminar este mes pagado?')) return;

    try {
      const res = await fetchConToken(`/pagos/mensuales/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + localStorage.getItem('token')
        }
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al eliminar mes');

      alert('✅ Mes eliminado correctamente');
      cargarPagos();
    } catch (err) {
      console.error('❌', err);
      alert('❌ Error al eliminar mes');
    }
  }

   let todosLosSocios = [];

function fetchConToken(url, opciones = {}) {
async function cargarOtrosIngresos() {
  const res = await fetchConToken('/pagos/otros-ingresos');
  const data = await res.json();

  const cont = document.getElementById('contenedorOtrosIngresos');
  cont.innerHTML = '';

  if (!data.length) {
    cont.innerHTML = '<p class="text-white">No hay otros ingresos registrados.</p>';
    return;
  }

  const porMes = {};
  data.forEach(i => {
    porMes[i.mes] = porMes[i.mes] || [];
    porMes[i.mes].push(i);
  });

  Object.keys(porMes).forEach(mes => {
    const div = document.createElement('div');
    div.className = 'mb-3';

    div.innerHTML = `
      <h6 class="text-warning">${mes}</h6>
      <table class="table table-sm table-bordered bg-white text-dark">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Monto</th>
            <th>Comentario</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${porMes[mes].map(i => `
            <tr>
              <td>${i.fecha}</td>
              <td>${i.tipo}</td>
              <td>$ ${i.monto.toLocaleString('es-AR')}</td>
              <td>${i.observaciones ?? ''}</td>
              <td>
                <button class="btn btn-danger btn-sm" onclick="eliminarOtroIngreso(${i.id})">🗑️</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;

    cont.appendChild(div);
  });
}

async function eliminarOtroIngreso(id) {
  if (!confirm('¿Eliminar este ingreso?')) return;

  try {
    const res = await fetchConToken(`/pagos/${id}`, {
      method: 'DELETE'
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error');

    cargarOtrosIngresos();
  } catch (err) {
    alert('❌ ' + err.message);
  }
}
  const token = localStorage.getItem('token');
  opciones.headers = opciones.headers || {};
  opciones.headers['Authorization'] = `Bearer ${token}`;

  return fetch(url, opciones).then(res => {
    if (res.status === 401) {
      alert('⚠️ Sesión expirada. Por favor, inicie sesión nuevamente.');
      localStorage.removeItem('token');
      window.location.href = '/admin-panel/login.html';
      throw new Error('Sesión expirada');
    }
    return res;
  });
}

async function cargarTiposIngreso() {
  const res = await fetchConToken('/config/tipos-ingreso');
  const tipos = await res.json();

  const select = document.getElementById('tipoIngreso');
  select.innerHTML = '<option value="">Seleccionar...</option>';

  tipos.filter(t => t.activo !== false).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.nombre;
    select.appendChild(opt);
  });
}



  async function cargarPagos() {
    try {
      const res = await fetchConToken('/pagos/mensuales', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
      });
      const data = await res.json();
      todosLosSocios = data;
      renderizarTabla(data);
    } catch (err) {
      console.error('❌ Error al cargar pagos:', err);
      alert('Error al cargar pagos');
    }
  }

  function renderizarTabla(lista) {
    const tbody = document.getElementById('tablaPagos');
    tbody.innerHTML = '';

    lista.forEach(socio => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${socio.numero}</td>
        <td>${socio.nombre} ${socio.apellido}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="toggleDetalle(${socio.numero})">Ver detalles</button>
          <div id="detalle-${socio.numero}" style="display:none;" class="mt-2">
            <table class="table table-sm table-bordered mt-2">
              <thead>
  <tr>
    <th>Año</th>
    <th>Mes</th>
    <th>Fecha Pago</th>
    <th>Monto</th>
    <th>Acción</th>
  </tr>
</thead>

              <tbody>
                ${socio.pagos.map(p => `
  <tr>
  <td>${p.anio}</td>
  <td>${p.mes}</td>
  <td>${p.fecha_pago}</td>
  <td>$${p.monto?.toFixed(2) ?? '-'}</td>
  <td><button class="btn btn-danger btn-sm" onclick="eliminarMesPagado(${p.id}, ${socio.numero})">🗑️</button></td>
</tr>

`).join('')}

              </tbody>
            </table>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

 

  document.addEventListener('DOMContentLoaded', () => {
    renderizarMeses();

    const inputBusqueda = document.getElementById('buscadorSocio');
    const listaSocios = document.getElementById('listaSocios');
    const modal = new bootstrap.Modal(document.getElementById('modalNuevoPago'));
    const formPago = document.getElementById('formPago');
    const inputFecha = document.getElementById('fecha_pago');
    const btnNuevoPago = document.getElementById('btnNuevoPago');

const btnNuevoIngreso = document.getElementById('btnNuevoIngreso');
const modalOtroIngreso = new bootstrap.Modal(
  document.getElementById('modalOtroIngreso')
);

btnNuevoIngreso.addEventListener('click', async () => {
  await cargarTiposIngreso();
  document.getElementById('fechaIngreso').valueAsDate = new Date();
  modalOtroIngreso.show();
});

btnNuevoPago.addEventListener('click', async () => {
  listaSocios.innerHTML = '';
  inputBusqueda.value = '';
  try {
    const res = await fetchConToken('/socio', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
    });
    const socios = (await res.json()).filter(s => s.activo);


    // Guardamos todos los socios temporalmente para búsquedas posteriores
    window.sociosParaBusqueda = socios;

    socios.forEach(s => {
      const opt = document.createElement('option');
      opt.value = `${s.numero} - ${s.nombre} ${s.apellido} - ${s.dni}`;
      opt.dataset.numero = s.numero;
      listaSocios.appendChild(opt);
    });

    // Evento input para filtrar también por DNI
    inputBusqueda.addEventListener('input', () => {
      const texto = inputBusqueda.value.toLowerCase();
      listaSocios.innerHTML = '';

      window.sociosParaBusqueda.forEach(s => {
        const nombreCompleto = `${s.numero} - ${s.nombre} ${s.apellido} - ${s.dni}`;
        if (
          nombreCompleto.toLowerCase().includes(texto) ||
          s.dni.toString().includes(texto)
        ) {
          const opt = document.createElement('option');
          opt.value = nombreCompleto;
          opt.dataset.numero = s.numero;
          listaSocios.appendChild(opt);
        }
      });
    });

  } catch {
    alert('❌ Error al cargar socios');
  }

  inputFecha.valueAsDate = new Date();
  mesesSeleccionados.clear();
  renderizarMeses();
  modal.show();
});


  // ✅ Escuchar cuando se selecciona un socio (solo una vez)
inputBusqueda.addEventListener('change', async () => {
  const opcion = [...listaSocios.options].find(opt => opt.value === inputBusqueda.value);
  if (!opcion) return;

  const numeroSocio = parseInt(opcion.dataset.numero);

  try {
    const res = await fetchConToken(`/pagos/mensuales/${numeroSocio}`, {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
    });
    const data = await res.json();
    mesesSeleccionados.clear();
    data.forEach(m => {
      const idMes = `${m.anio}-${m.mes}`;
      mesesSeleccionados.add(idMes);
    });
    renderizarMeses();
  } catch (err) {
    console.error('❌ Error al cargar meses pagados:', err);
  }
});


// CSS extra sugerido para mostrar tilde
const style = document.createElement('style');
style.innerHTML = `
  .mes-cuadro.pagado {
    background-color: #e0e0e0;
    color: green;
    font-weight: bold;
    position: relative;
  }
`;
document.head.appendChild(style);

formPago.addEventListener('submit', async (e) => {
  e.preventDefault();

  const opcion = [...listaSocios.options].find(opt => opt.value === inputBusqueda.value);
  if (!opcion) return alert('❌ Socio inválido');

  const numeroSocio = parseInt(opcion.dataset.numero);
  const meses = obtenerMesesPagados();

  if (meses.length === 0) {
    alert('⚠️ Seleccioná al menos un mes a registrar');
    return;
  }

  try {
    const res = await fetchConToken('/pagos/mensuales', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('token')
      },
      body: JSON.stringify({ numeroSocio, meses })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al registrar meses');

    alert('✅ Pago registrado correctamente');
    modal.hide();
    cargarPagos();
  } catch (err) {
    console.error('❌', err);
    alert(err.message || '❌ Error al registrar el pago');
  }
});

document.getElementById('formOtroIngreso').addEventListener('submit', async (e) => {
  e.preventDefault();

  const tipo_ingreso_id = document.getElementById('tipoIngreso').value;
  const fecha_pago = document.getElementById('fechaIngreso').value;

  const montoRaw = document.getElementById('montoIngreso').value
    .replace(/\./g, '')
    .replace(',', '.')
    .replace('$', '')
    .trim();

  const monto = parseFloat(montoRaw);
  const observaciones = document.getElementById('comentarioIngreso').value;

  if (!tipo_ingreso_id || !fecha_pago || isNaN(monto)) {
    return alert('⚠️ Completá todos los datos correctamente');
  }

  try {
    const res = await fetchConToken('/pagos/otros-ingresos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tipo_ingreso_id,
        fecha_pago,
        monto,
        observaciones
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error');

    alert('✅ Ingreso registrado');
    modalOtroIngreso.hide();
  } catch (err) {
    alert('❌ ' + err.message);
  }
});


cargarPagos();
cargarOtrosIngresos();
});

  document.getElementById('buscadorPagos').addEventListener('input', () => {
  const texto = document.getElementById('buscadorPagos').value.toLowerCase();
  const filtrados = todosLosSocios.filter(s => {
    const nombreCompleto = `${s.nombre} ${s.apellido}`.toLowerCase();
    const dniStr = s.dni ? s.dni.toString() : '';
    return nombreCompleto.includes(texto) || dniStr.includes(texto);
  });
  renderizarTabla(filtrados);
});




function logout() {
  localStorage.removeItem('token');
  window.location.href = '/admin-panel/login.html';
}


function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('show');
}


</script>


</body>
</html>
